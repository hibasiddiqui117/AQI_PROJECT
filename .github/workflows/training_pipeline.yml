name: AQI Training Pipeline

on:
  schedule:
    # Runs daily at 2:00 AM UTC
    - cron: "0 2 * * *"
  
  # Allows manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-training-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      
      - name: Debug - Check files before training
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Files before training ==="
          ls -la
          echo "=== Data directory contents ==="
          ls -la data/ 2>/dev/null || echo "No data directory"
          echo "=== Models directory ==="
          ls -la models/ 2>/dev/null || echo "No models directory"
      
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib
          echo "=== Installed packages ==="
          pip list
      
      - name: Check Data Availability
        run: |
          if [ -f "data/processed_aqi_data.csv" ]; then
            echo "Data file found"
            wc -l data/processed_aqi_data.csv
            head -5 data/processed_aqi_data.csv
          elif [ -f "data/aqi_data.csv" ]; then
            echo "Using aqi_data.csv"
            cp data/aqi_data.csv data/processed_aqi_data.csv
          else:
            echo "No data file found!"
            exit 1
          fi
      
      - name: Run Training Pipeline
        run: |
          python pipelines/training_pipeline.py
      
      - name: Debug - Check files after training
        if: always()
        run: |
          echo "=== Models after training ==="
          ls -la models/
          echo "=== Training summary ==="
          cat models/training_summary.json 2>/dev/null || echo "No summary file"
      
      - name: Commit and Push Models
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes
          git pull --rebase origin main || true
          
          # Add all model files
          git add models/
          git add data/processed_aqi_data.csv
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated model training update - $(date -u '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "Successfully pushed updated models"
          fi
      
      - name: Upload Training Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-debug-logs
          path: |
            models/
            data/
            *.log
          retention-days: 3