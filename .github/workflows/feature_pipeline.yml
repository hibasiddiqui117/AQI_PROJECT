name: AQI Feature Pipeline

on:
  schedule:
    # Runs every hour at minute 5
    - cron: "5 * * * *"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      
      - name: Debug - List files before pipeline
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== Files before pipeline ==="
          ls -la
          echo "=== Data directory (if exists) ==="
          ls -la data/ 2>/dev/null || echo "No data directory yet"
      
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "=== Installed packages ==="
          pip list
      
      - name: Run Feature Pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          LAT: 24.8607
          LON: 67.0011
        run: |
          python pipelines/feature_pipeline.py
      
      - name: Debug - List files after pipeline
        if: always()
        run: |
          echo "=== Files after pipeline ==="
          ls -la
          echo "=== Data directory contents ==="
          ls -la data/ 2>/dev/null || echo "No data directory"
          echo "=== CSV file content (first 5 rows) ==="
          head -5 data/aqi_data.csv 2>/dev/null || echo "No CSV file found"
      
      - name: Commit and Push Changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if data file exists and has changes
          if [ -f "data/aqi_data.csv" ]; then
            # Pull latest changes
            git pull --rebase origin main || true
            
            # Add and commit
            git add data/aqi_data.csv
            
            # Check if there are changes to commit
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Automated AQI data update - $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main
              echo "Successfully pushed changes"
            fi
          else
            echo "No data file to commit"
          fi
      
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            data/
            *.log
            *.txt
          retention-days: 3